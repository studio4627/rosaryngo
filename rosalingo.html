<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로사링고 - RosaRyngo</title>
    <style>
        :root {
            --bg-color: #fcf9f2;
            --point-color: #1a4371;
            --accent-color: #bfa15c;
            --text-color: #2c3e50;
            --word-bg: #eae3d2;
            --error-color: #a52a2a;
            --success-color: #2e7d32;
        }

        body {
            font-family: 'Nanum Myeongjo', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        .rosary-img {
            width: 50px;
            height: auto;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        .progress-container {
            height: 5px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease-out;
        }

        .content-area {
            height: 70%;
            flex-grow: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h2 { 
            font-size: 1.25rem; 
            color: var(--point-color); 
            margin-top: 0; 
            margin-bottom: 5px;
        }
        
        .mystery-subtitle {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .meditation-text { 
            font-style: italic; 
            color: #555; 
            line-height: 1.9; 
            font-size: 1.05rem;
            white-space: pre-line;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 90%;    
            padding: 0 10px;
            overflow: scroll auto;
        }

        .answer-area {
            min-height: 100px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
            padding: 10px;
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: start;
            gap: 12px;
            margin-top: auto;
            margin-bottom: 10px;
            position: relative;
            min-height: 160px;
        }

        #lock-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            z-index: 50;
            display: none;
        }

        .word-chip {
            padding: 10px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pool-chip {
            background-color: var(--word-bg);
            color: var(--text-color);
        }
        
        .pool-chip.used { 
            background-color: #f5f5f5; 
            color: transparent; 
            cursor: default; 
        }

        .pool-chip.wrong {
            background-color: var(--error-color) !important;
            color: white !important;
            animation: shake 0.4s;
        }

        .answer-chip {
            background-color: var(--point-color);
            color: white;
            animation: popIn 0.3s ease-out;
        }

        .footer {
            padding: 15px 0;
        }
        .btn-next {
            width: 100%;
            padding: 16px;
            background-color: var(--point-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Nanum Myeongjo', serif;
            cursor: pointer;
        }
        
        .btn-next:disabled { 
            background-color: #f0f0f0; 
            color: #ccc; 
            cursor: default;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">

    function init() {
        document.getElementById('mystery-subtitle').innerText = `${todayMyst} 바치는 날`;
        loadStep(0);
    }

    function loadStep(index) {
        if(index >= flow.length) {
            alert(`기도를 마쳤습니다.\n평화가 함께하시길.`);
            location.reload();
            return;
        }
        currentStep = index;
        const step = flow[index];
        const nextBtn = document.getElementById('nextBtn');
        
        document.getElementById('title').innerText = step.title;
        updateProgress();

        if(step.type === 'quiz') {
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('meditation-box').classList.add('hidden');
            nextBtn.classList.add('hidden'); // 퀴즈에선 버튼 숨김 (자동이동)
            setupQuiz(step.data);
        } else {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('meditation-box').classList.remove('hidden');
            document.getElementById('meditation-box').innerText = step.text;
            
            nextBtn.classList.remove('hidden');
            nextBtn.disabled = false;
            nextBtn.innerText = "계속하기";
        }
    }

    function setupQuiz(sentenceArray) {
        targetSentenceArray = sentenceArray;
        currentWordIndex = 0;

        const answerArea = document.getElementById('answerArea');
        const wordPool = document.getElementById('wordPool');
        
        answerArea.innerHTML = '';
        wordPool.querySelectorAll('.pool-chip').forEach(chip => chip.remove());

        const shuffledWords = [...sentenceArray].sort(() => Math.random() - 0.5);

        shuffledWords.forEach((word) => {
            const chip = document.createElement('div');
            chip.className = 'word-chip pool-chip';
            chip.innerText = word;
            chip.dataset.word = word; 
            chip.onclick = () => handleWordClick(chip);
            wordPool.appendChild(chip);
        });
    }

    function handleWordClick(clickedChip) {
        if(clickedChip.classList.contains('used') || clickedChip.classList.contains('wrong')) return;

        const clickedWord = clickedChip.dataset.word;
        const correctWord = targetSentenceArray[currentWordIndex];

        if (clickedWord === correctWord) {
            clickedChip.classList.add('used');
            const ansChip = document.createElement('div');
            ansChip.className = 'word-chip answer-chip';
            ansChip.innerText = clickedWord;
            document.getElementById('answerArea').appendChild(ansChip);

            currentWordIndex++;

            if(currentWordIndex === targetSentenceArray.length) {
                // 문장 완성 시 0.5초 대기 후 자동 이동
                document.getElementById('lock-overlay').style.display = 'block';
                setTimeout(nextStep, 500);
            }
        } else {
            failFeedback(clickedChip);
        }
    }

    function failFeedback(chip) {
        chip.classList.add('wrong');
        const overlay = document.getElementById('lock-overlay');
        overlay.style.display = 'block';
        setTimeout(() => {
            chip.classList.remove('wrong');
            overlay.style.display = 'none';
        }, 600);
    }

    function nextStep() {
        document.getElementById('lock-overlay').style.display = 'none';
        loadStep(currentStep + 1);
    }

    function updateProgress() {
        const percent = (currentStep / (flow.length - 1)) * 100;
        document.getElementById('progressBar').style.width = percent + "%";
    }

    init();
</script>
